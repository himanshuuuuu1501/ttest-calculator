<!DOCTYPE html>
<html>
<head>

<title>T-Test Calculator</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
width:400px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

.result{
margin-top:20px;
background:#eee;
padding:10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>One Sample T-Test</h2>

<input id="data" value="102,98,101,105,97,99,103">

<input id="mean" type="number" value="108">

<select id="hypothesis">
<option value="two-sided">Two-sided</option>
<option value="less">Less</option>
<option value="greater">Greater</option>
</select>

<button onclick="runTest()">Run Test</button>

<div class="result" id="result"></div>

</div>

<script>

async function runTest(){

let raw = document.getElementById("data").value
let mean = document.getElementById("mean").value
let hypothesis = document.getElementById("hypothesis").value

let data = raw.split(",").map(Number)

let response = await fetch("/run_test",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
data:data,
pop_mean:mean,
hypothesis:hypothesis
})
})

let result = await response.json()

document.getElementById("result").innerHTML =
"T Statistic: " + result.t_statistic.toFixed(4) + "<br>" +
"P Value: " + result.p_value.toFixed(6) + "<br><br>" +
result.decision

}

</script>

</body>
</html>
